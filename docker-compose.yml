version: '3.9'

services:
  postgres:
    profiles: ["dev"]  
    image: postgres:16
    container_name: Comunicacao_API
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: comunicacao_db
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-dev:
    profiles: ["dev"]
    build:
      context: .
      target: development
    container_name: api_dev
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  api-prod:
    profiles: ["prod"]
    build:
      context: .
      target: production
    container_name: api_prod
    restart: unless-stopped
    env_file:
      - .env.prod 
    ports:
      - "8081:8080"

volumes:
  postgres_data: